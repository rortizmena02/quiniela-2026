name: Update World Cup results

# Refreshes quiniela_brackets_v4.json from the keyless openfootball dataset and
# commits it back if anything changed. The Pages site fetches the JSON on load,
# so each commit publishes automatically. No secrets required.

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:         # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Fetch latest results
        run: node fetch_results.js

      - name: Commit if changed
        run: |
          if git diff --quiet -- quiniela_brackets_v4.json; then
            echo "No result changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quiniela_brackets_v4.json
          git commit -m "chore: update World Cup results [skip ci]"
          git push
