name: Dry-run results mapping

# Manual-only. Runs the ingestion script in --dry-run mode and prints the result
# to the Actions log so you can verify the openfootball -> src_row mapping in the
# browser. Commits nothing and writes no files.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch results (dry-run, no commit)
        run: node fetch_results.js --dry-run
